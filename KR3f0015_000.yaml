body:
  text: 渾蓋通憲圖説天文算法類一推步之屬提要臣等謹案渾蓋通憲圖説二卷明李之藻撰之藻有頖宫禮樂疏己著錄是書出自西洋簡平儀法蓋渾天與蓋天皆立圓而簡平則繪渾天為平圓渾天為全形人目自外還視蓋天為半形人目自内還視簡平止于一面則以人目定於一處而直視之之所成也其法設人目自南極或北極以視黄道赤道及晝長晝短諸規憑視線所經之㸃歸界於一平圓之上次依各地北極出地以視法取天頂及地平之周亦歸界于前平圓之内次依赤道經緯度以視法取七曜恒星亦取歸于前平圓之内赤道為中圏赤道以外愈近目則圏愈大而徑愈長赤道以外愈逺目則圏愈小而徑愈短之藻取晝短規為最大圏乃自南極視之晝短規近目而圏大其意以為中華之地北極髙凡距北極百一十三度半以内者皆在其大圏内也卷首總論儀之形體上卷以下規晝度分時刻及制用之法後卷諸圖咸根柢於是梅文鼎嘗作訂補一卷其説曰渾蓋之器以蓋天之法代渾天之用其製見於元史札馬魯丁所用儀器中竊疑為周髀遺術流入西方然本書黄道分星之法尚缺其半故此器甚少蓋無從得其制也兹為完其所缺正其所誤可以依法成造云云又有璇璣尺解一卷皆足與此書相輔而行以己見文鼎書中兹不復贅焉乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
