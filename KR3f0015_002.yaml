宮規上相值之處即是星位蓋勻分不合黃道惟從對宮貫極上疏下密其度自合此與前分黃道宮與黃極者同與前赤道平規所得無異而法更捷云凡分勻度法不能每規細量但設一平版或銅或堅木為式細畫周天度四分之一如扇面然用時以規移置其上量取即得凡位置星辰必須兼前數術以相參驗始可無爽若盤小星密只擇簡要大星用之如左婁宿中星星大陵大星星畢宿大星軒參左肩星五車北右天狼星宿中星轅大星太微帝座織女大星角宿南星北落師門大角右二星心宿大星天津室宿北星右凡安星之法皆取針鋩為星以對度分緣星體遙逺微茫不能别為他法故銼銅為針根巨末鋭繫之天盤稍取屈曲以防損壞歲周對度圖說第十四凡平儀皆列三百六十度以從捷要若乃一歲之周實三百六十五日三時則每日太陽之行實不能及一度若槩以每日一度求之其失不細今於儀之背周天度內另立一規以合歲周以對節氣中氣其法先定奧日奧日者從天頂中線入巨蟹九度為齘望盤心作一線用規自度齘至盤心折半求中又自中至盤心折半凡為折半者五其第五次之心則自盤心至度齘三十二分之一也即以此處為旋規之樞上儘九度齘旋大規分三百六十五度四之一為歲周規較周天規稍偏以歲規自天頂中勻分十二得中氣又勻分二十四得節氣而各畫其界蓋厯家以南至北至分二至復折二至相距之中以定春秋分故太陽已過赤道三日半而為春分太陽未交赤道三日半而為秋分先後共差七日必以規筒先考內輪歲周之度視其所當外輪天度在於某齘然後准此以視天盤黃道方與天合也其二十八宿細度亦隨歲周鍥之自冬至起交箕四度以甲辰躔為率右行至春分交壁三度夏至交參九度秋分交翼十七度凡二十八宿定度箕九度半斗二十三度半其三度太入丑宮牛七度女十一度其二度入子宮虛九度危十六度十二度太入亥宫室十八度少壁九度少奎十七度太一度太入戌宫婁十二度少胃十五度太三度太入酉宫昴十一度畢十六度半七度入申觜五分參一十度少井三十一度八度少入未宫鬼二度栁十三度四度入午星六度少張十七度太十五度少入巳翼二十度軫十八度太十度入辰角十二度太亢九度半氐十六度半一度少入卯房五度半心六度少尾十八度三度入寅此皆約其大略不能細具分秒大約過三之二為太三之一為少二之一為半而臺厯過宮之度亦可槩見儀載白羊等宮率取便於鍥度蓋西國厯法不動的月從戌推起所謂步戍成歲若中厯太陽過宮見前注六時晷影圖說第十五晝夜長短刻數前法備矣又有不論長短但以自晨至昏勻為六時者古法有之按軌顧影亦可知一日之中已過幾許起學人寸隂之惜也刻之平儀之背隙處旁借周天度以測日景中取地平橫線上半規為用於半規之中為樞上際規線下際盤心橫線作一小規此為午線規當第六停之界次以平線上之大半規勻分十二停各刻其界以為規際而俱過盤心以旋之其各規之樞依三㸃聯圜之法取諸天頂直線之中大約皆在午線南上以為規樞也東第一規為第一分界其次規為二界以漸計之其用先審本日是何節氣午中日高幾度幾分取其最高之景為用以瞡筒中線置於旁鐫分天度而審其正當內規所在以墨點記尺上此㸃有二三日可用因以所點測太陽景視其所到高低以占時候勾股弦度圖說第十六天地之道盡於方圜圜以規天方以條地刻方度於圜度之內而用瞡筒四游以凖之九數以歸之以御逺近高深之數有燦然者矣法取儀背地平線下半規為半方形兩角對樞心各作一斜線曰弦以為勾股相交之限在下者曰勾在側者曰股以望高若深為大股率取儀小股凖之以望逺若近為大句率取儀小句凖之皆據瞡筒以定其度凡二股二弦一句其句勻分二十四度其兩股各勻分十二度而每度之中又各勻為十二度其兩股各勻分十二度而每度之中又各勻為十二分每停共一百四十四分如不能細分則刻作三分或五分七分舉其大略亦可但每畫皆宗樞極凡有所測以筒對影而審察其度云其法另具定時尺分度圖說第十七取儀面半衡為用當中分一直線首設橫線如十字以十字為樞就平衍器上用規量度先倣儀度作赤道半規自平線至頂際左右各列九十度而從卯上一度起望酉中作弦就午線一一刻之如取長短規法至一百十三度半而㑹於短規之際稍引長焉仍去其分中之半以便檢對十字心鑽竅與瞡筒共入一樞此尺度用定時刻若以審太陽列星出入赤道幾何此亦切用或不能逐度細分則二度一齘亦可用例圖說第十八凡盤隂外輪度專藉瞡筒為用其瞡筒全用立表二竅仰對日景以測日高幾度幾分及星高幾度幾分先以二大竅睹其略次以一細竅審其微凡晝觀太陽者先以瞡筒定其度分高卑因檢是日太陽在某節氣之幾日以歲周對度圖定之置其躔於黃道度上因以黃道躔配合地盤所當漸升之度次以定時尺加黃道齘直指外輪時刻不惟可知時刻抑且知其細度云凡審知太陽每日所在宮度即知太陽對衝宮度若未審太陽宿所在確度而欲以通憲檢正之者一面另下漏箭至子正四刻以筒求星對地盤度而視午中線得對衝視子中線得本躔度凡以瞡筒測太陽午影而未知其為已過午未過午者用參伍法初測之在某度再測之在某度若初下再高則未過午也初高再下是已過午也未過午置日度於盤左已過午置日度於盤右凡夜觀近南星宿未知其在東在西亦如前以筒連瞡二次漸高者在東方漸卑者在西方凡欲知太陽列宿高低幾何不論何日何時但以黃道星宿盤按時旋轉就地盤漸升度求之雖未測景可以盡算凡欲求太陽出地最高之度於正午時驗之用參伍法取本日最高影為據但定一歲則他歲同節候及同離節候第幾日者其太陽皆同凡欲遍考每節每日午景最高幾度即審其日黃道所躔何在而以躔加於午線後就漸升度算之頃刻可以周知一歲即以定時尺檢之亦同此在已知地度之後又法即以本地所離赤道之度與後所列太陽出入赤道緯度二數相參若春分後太陽北行即加所得緯度於地度外秋分後太陽南行即減所得緯度於地度內太陽離赤道緯度圖右圖以節氣配過宫聊便檢閲其白羊天稱之初為太陽正交赤道之候今厯注晝夜五十刻之日是也乃是春秋正中獨有此日立表於地自朝至暮表顛日景如矢直指卯酉之正天下皆同製有晷影可驗厯法但定二至日因折衷以取二分共作四大限所以春分在太陽未交赤道前三日秋分在太陽已交赤道後三日今但依歲周對度圖考之自凖凡天隂測日其景不能通竅但以瞡筒二大竅仰窺雲內微景亦可略知凡稽時於夜者以星為凖以瞡筒二竅仰望所求之星在何度分務求確當以星檢盤按度加於漸升度上仍查本日太陽所躔黃道度處而以定時尺所指視其某時某刻此法惟太陽及經星可用若太隂去地甚近則當算地中為凖難以地面測之辰星太白亦然又五星各有遲留退逆故雖熒惑歲填去地絶逺亦不繁及凡晝夜不拘長短可以勻作十二分而以太陽所到測定但因地盤漸升度密難以細載且將地平規下勻分但以太陽對衝法推之自可互見盤隂又有小規若天盤黃道正儀以之用星亦可凡欲知各節候晝夜長短須考日出日入時刻以黃道先定日躔加於地平線界而以定時尺視其刻分循此上至午中得幾何刻為半晝數倍之得全晝數其外輪時刻每三十度得一時每三度四十五分得一刻右圖且以四刻為一時以便推算每時共六十分每刻得一十五分而以一分為六十秒一秒為六十忽自上視之則以度化時化分自下視之則以度之分化時之分若秒以度之秒化時之秒若忽也凡計日百刻者每刻作六十分每時有八刻又零二十分作二小刻今節去餘分以便鐫記故每日止九十六刻通算另有乘除之法以瞡筒所測得時刻或逐節所查得度與中法一百相乘為實而以九十六為法除之即得若有零分零秒者化之凡欲查天下晝夜長短細數以北極出地多寡為候先檢前圖日離赤道逺近緯度乃與本地方下所列黃赤差率相凖如後圖視其所差若干度依前化度為時即得其地晝夜長短之數蓋北極多寡既異則黃道斜轉其度自各不同極之出地少則所差度少晝夜刻差亦少若北極漸高則黃道所差視赤道之下漸多故北方冬至晝短夜長比於南方迥異夏至亦然周髀曰北極之下其人朝種暮穫蓋以春秋分之際判朝暮一晝夜當期之日若地當赤道之下則通年晝夜平分以渾儀視之可知非誕說也黃道緯與赤道經差率第一行七曜所躔黃道緯也以後皆北極出地度下所注度乃赤道三百六十內外增減之數此北極度已盡中國幅員逺國不暇具載右圖以黃道所離赤道之緯而對北極度下所注以算天下各節氣之晝夜長短應有餘為長率不足為短率依此可得半晝之數加一倍為全晝數就九十六刻內減晝刻分數可得夜刻分數以減夜數亦得晝數此圖不能細具零分其緯度有零分者視前格與後格中差幾何而以零分併全度所化乘之以度法六十歸之若求百刻法則另用乘除如前凡盤中未定朦線而欲以時尺定之者取平線以上十八度為凖假如欲知晨段朦景幾刻則將本日所躔加於西地平日未沒前十八度齘而以定時尺審其相去日沒幾刻其對衝度即是晨度刻數求昏度者倣此如已定朦線者則以日躔置朦線上與日出日入之時相較而其刻數多寡可知大約北極愈高則朦朧影亦愈久而一日之內晨昏可以互見一歲之內日躔緯度相同者亦可以互見凡勻分一晝為十二度而測定之者有盤背小度名分曜晷以本日太陽午影最高度㸃識瞡筒隨日高低望之法具前圖如欲分為五分而審其已過幾分則以黃道置地盤日所到度而以對宫度詳之看在分更線上第幾畫即是日間已過幾分之數如大暑日則視大寒度是也凡昏旦中星晝夜刻數不齊朦影又不齊殊難確當此儀却有四要可考一天中一地中乃子午之正向一出地一入地定東西之升沉以日以星定其時時正而某星當中某星初出某星初入暸然也因而推日躔某宿某度亦瞭然也但以節氣為限則每歲皆同至過百年後列宿推移未免稍差則天盤度當推改耳凡查太陽離赤道內外幾度以日躔加午線上而視其地盤赤道之瞡相離度分若干列宿同法或以定時尺度加上日星之躔亦得其數日躔每日有差星位終年不動百餘年或差一度半度亦以去極逺近為率推改如前例云凡察北極高卑晝取太陽夜取列宿皆可審定於正午時瞡望太陽出地高幾何度而查是日節氣所躔原在某度因以前日離赤道緯度為算如日行赤道內則用減日行赤道外則用加如前法假如大寒後十四日離赤道外十六度五十七分日影高三十三度三分以日影加赤道數得五十度便知赤道高五十度其北極去赤道九十度除去五十度即知北極出地四十度若厯紀晝夜各五十刻之日午景所得正在赤道之上最為易算又法以筒測影専算正午日離天頂幾度假如大寒後十四日驗得日離天頂五十六度五十七分是日太陽行赤道南十六度五十七分除十六度五十七分仍剩四十度則知赤道出地五十度北極出地四十度大約於九十度內除赤道度即得北極度若除北極度即得赤道度凡以星察北極出地幾度者隨取一大星為凖以筒測其曾到午位正中否若未知地位之正亦如觀太陽法參伍驗之如已知地正者俟其既到午位再看離地幾度因查此星原去北極幾度去赤道南北幾度而乘除算之假如畢宿大星原在赤道北十六度今測之離地六十六度二十分內除十六度尚有五十度二十分便知本地赤道出地五十度二十分於九十度內除去五十度二十分即是北極出地三十九度四十分須知地方北極高低度分乃可安頓地盤凡南北相懸者驗以北極至於東西異地則當以月蝕驗之先知一處地方月食定在何時何刻為食初候或食甚復圓之候至於他處蝕時按憲觀其初蝕及蝕甚復圓在於何時何刻與前所定時刻相去幾度或以合朔推算其法亦同俱可測其地差大約每四刻應差十五度假如時差八刻則晷影應差三十度是地方相距亦三十度也再以北極高低參算斜直定其里數自北至南每北極差一度即地差二百五十里其自東至西者赤道之下亦如之漸南漸北其度漸窄則其里數亦減有立成算法右法以地凖之則每度徑得二百五二里每分徑得四里零六分里之一凡積十四秒零十四忽為一里積二一分二十四秒為十里積里十四分為百里積四度為千里積四十度為一萬此皆以弦直道論云凡視地盤度不知為何地合用之度者自地平線數至盤心可以知北極出地之數自天頂數至赤道可以知地方去赤道之數凡察太陽同出同入之星先定太陽躔度置地平線而視其同在線上者是何星宿即係當日同出同入之星若欲求某星以何日與太陽同出同入則以星置地平線檢黃道躔即得欲求同過午中者亦如之而以午線為法凡欲豫定各星當以何時出地何時入地或何時到某位何時過午中俱以星盤輪轉而審其太陽所躔以時尺按之以外輪對之一一可見凡經星隨日東出或西入欲知何日離日可以晨見者以其星置東地平規上而視其日出以前朦影是值黃道何度即得此星東方晨見之期若視西朦影下黃道所值即知此時此星西方昏見之期或查某星何日入地不見或近太陽不見者則置西平地規亦檢太陽其法正與前反凡審辨方位者以子午線定南北以過頂曲線之交於赤道者定東西其餘八方或十二辰或二十四向或六十四卦位或三百六十度皆以地盤定之茲且設二十四線每線該十五度自地平達天頂凡太陽及諸星見在某位或豫定某時當在某位及從何位下出地何位下入地按圖皆如指掌故已知方隅正位雖不用升度亦可若未知方隅正位即以通憲定之亦自精當不拘何時以筒瞡得日高度即運黃道躔加於地盤升度視其見在何方及何細度乃以背仰頓平處移瞡筒之中線嚮之復以目仰望日影令其上下相對既定一向則其餘東西南北皆據儀背外輪之度一切審定夜用列星亦同此法凡星辰隱見多寡皆視北極高卑古稱近北極三十六度星辰常見不隱近南極三十六度星辰常隱不見殊未必然茲以盤心為極樞以列宿盤旋轉觀之凡不離地平線上者皆為常見之星其餘隨時各有出入則南北顯見多寡遲疾皆可推測凡查五更時候瞡定星度安置升度以尺就太陽視所躔見在朦影之下幾線若在初一線內為初更其餘依次凡初學未識星宿者但認取一星見在之度餘星以瞡筒測望而凖之以在垣度分參之以地盤宮位亦可推廣假如到晚朦影盡時向高曠可望處所置本日所躔於朦線上即視何星方出何星將入或在正東或在正西正南北者一一認取何向次將憲背仰頓平處先定南北之位次以瞡筒旋轉與星相望則可知地平以上之星若欲辨認稍高之星則查其星在於何方及離地幾度然後對度向方亦可檢取如京師夏至二日安本日度於朦線上則見危宿北星自正東卯中出室南星出地離正東以北一十八度天船大星出地離正北以東十一度壁北星將出離東北艮方稍東一十四度軒轅大星將沒離正西稍北十三度依前法以憲背觀之自當了了又查河鼓大星在東地平上十一規有半即是高三十四度半位在正東稍南十二度則置瞡筒於三十四度上向東測求餘星倣此凡厯家每日以七曜之一為本日所直宿蓋取天體層數定之晝夜勻作二十四分如第一分屬太陽則第二為金三為水四為月五為土六為木七為火周而復始則其第八第十五第二十二皆屬太陽至二十四屬水而一日終焉次日之第一乃當屬月厯取首分之曜為一日之直因以月繼日而以日月火水木金土作每日之序云其所云二十四分者不論晝夜長短但勻日出後十二分日入後十二分亦非一時截作兩時今以地盤勻分二十四分相對推之可見其序此外别有推論祲祥及人誕生所值智愚夀夭諸法此不悉載句股測望圖說第十九凡句股以御逺近高深但有影可射者用瞡筒竅視其影如無影可射者以目力對望之凡所望皆如筒竅所指為據凡筒在句股之交者句與股等知句即知股知股即知句其不適在句股之間者别有算法凡以矩法御勾股者先須熟識變互之法變法者變句度為股度變股度為句度也各以方儀細度為凖方儀每隅皆分細度共作一百四十四數立此為積而以筒中綖所值之度分焉即得變度假如筒在股三度今欲化為句度即以一百四十四為實以三數為法歸之是得四十八為句度數假如筒在勾五度零三分度之二今欲化為股度即以一百四十四為實而以五度三分度之二為法歸之是得二十五度零十七分度之七為股度數也因句法平行股法直上直上之度逾上逾寬不可以平度等假如股之一度乃句之一百四十四度故必須立算互換始窮真數矩法之妙全在於此有餘分者悉以全度化為零分其細度百四十四者亦從化法凡以筒望高者以所望為大股以我足下至彼股下為大句而以儀之小句股知之參伍於儀度以凖之若筒之齘在小句則大股之長過於大句也已知大句是幾何步即以儀度乘之即十二度以小句所得度分之而其大股之高可知焉假如望之而筒齘在小句八度無餘分其大句長三十步則以儀度十二乘大句三十得三百六十步而以小句之八數分之得四十五是知大股之高四十五步也若齘在小股則大股不及大句也已知大句是幾何步却以小股所得度乘之而以儀度分之即十二度假如齘在小股七度而大句長六十步以小股之七乘大句六十共四百二十步而以表度之十二分之得三十五是知大股高三十五步大抵所求在大股者筒在句則用以分而乘數在儀筒在股則用以乘而分數在儀然須以自目至足之數加大股上如先知大股而欲求大句之數者其乘分之法反用如已知塔高若干而欲覆知其塔影所底之類筒在句則用以乘而分用儀度筒在股則用以分而乘用儀度一互換之凡以筒望高而筒齘所值有餘分者取其總度悉化為餘分以乘之亦化為餘分以歸之假如筒齘在小股七度零五分度之一是有餘分也即每度皆化為五分是為三十六分此望股值股與大股為乘法其大句長六十步以所值小股數三十六分乘大股六十數共二千一百六十而以儀度為分法亦每度皆化五分共六十分以歸之得三十六是知大股高三十六步也如筒齘在小句者亦倣前例化用之皆加自目至足數若以筒望高既不知大股之數亦不知大句之數須以重差測之先以筒遙望審其齘在於某度又或前或却若干步要取徑直審其齘在於某度其兩次筒上所測凡差幾度為筒差在人足所立為表差各以儀度十二乘表差而以筒差為法分之然有正算有變算凡望大股之數而筒在句度用正法若望大股之數而筒在股度者用變法假如初測筒齘在句一度次測齘在句十一度此望股得句也用正法其筒差十度用為分法其表差二十五步用以與儀度十二相乘是為正算而取其乘之所得計三百以筒差歸之得三十加以自足至目之數或加一步併入大股為高三十一步假如初測筒齘在股九度次測齘在股四度此望股得股也用變法變股為句變九度為一十六度變四度為三十六度九分一百四十四得十六四四分一百四十得三十六其法如前兩筒齘差二十度用為分法其表差五十步與儀度十二相乘而取其乘之所得計六百以筒差歸得三十數加自目至足一步為三十一步高其已知大股幾何高而欲覆知其大句之數為幾何逺是為以高量逺即以前法互換為乘分云附録一法以鏡量高置一鏡於平地對所量處却立取其最高倒影入鏡中心先定自目至足為小股幾何尺自鏡心至所求之足為大句幾何尺兩數相乘而以吾足至鏡心為小句之數以分之其分得之數即其所望之數或以水㿻代鏡亦同又法立表求高先對望立一長表次依直線退行若干步直立一短表或不用短表即以已身自目至足數代之尤便以目自短表際或即吾目處望長表際及所望最高之際三際相齊以所望為大股而取前表較後表高差幾何為小股又自後表至所望最高之址幾何尺為大句以小股與大句相乘而以前後表相距之尺寸為法分之加短表顛至地之數即知大股之高如不能知其大句之數則立四表而互徵之先立一表退立一短表或即以已目代之望短表際與長表際及所望最高之際相齊乃量長短表相距幾何為前數又或前或郤但取直線再立長表移前表用之亦可亦退後立短表自短表際望長表際及最高際皆齊又量長短表相距幾何為後數乃較前後數相差幾何為表句差次以長表較短表多幾何為表股差次察前短表距後短表地幾何為大句差以大句差與表股差相乘而分之以表句差焉算定加短表之數即得大股數凡以筒測深者以所望之深為大股以水徑為大句以儀中度為小句數而參伍於儀度以凖之先以筒竅自此對射水際審值何度如在句度則以儀度乘水徑數而以小句所值度分之假如以筒量井深幾何其小句值三度上其井水徑十二尺即以十二乘儀度亦十二一共乘得百四十四以小句三數歸之得四十八尺是知井深四十八尺也如在股度則以小股度與井水徑相乘却以儀度分焉凡以筒望逺者務取身立處與所望處相平或望極逺則立於高臺大山以望之亦須先知臺址山址到吾目幾何丈尺方可布算而以所望之逺為大句以吾目至足或臺址山址之與彼相凖處為大股以儀為小句股而測之凡筒在句度者是大句不及大股也以小句所值度乘大股而以儀度十二分之其分之所得為大句數若筒在股度者是大句逺於大股也以儀度十二乘大股而以小股所值度分之亦如前附録一法立表求逺者遙望立一長表或以已身自目至足代之取直進幾步立一短表自長表際望短表際及所取最逺之際相齊乃以長表較短表多幾何為表股差率次量二表相距幾何為表句差率長表高幾何為大股率以表句與大股相乘而以表股差分之即得大句逺數又有望極逺平立四表者不論表之長短但取四隅立算其法尤精先對所望立一表為前表次退若干步立一表為後表作直弦相望次於前表或左或右相去幾何立一表為前輔表前後表與所望處如弦直射則此表與前表須取方橫列不可稍遍於前後也謂之直角形與前後表如曲矩又於後表左右立一表為後輔表自後輔望前輔及所望之逺處亦如直弦後輔亦與後表橫對不可稍差蓋前後二表與後輔亦如曲矩是也其自後表至後輔比於前表至前輔尺寸必多乃較其所多之數為大句差以前表至後表數為小股差以前輔表至前表為小句差而以小股乘小句以大句差分之即得逺數又法立表用矩者即木匠曲尺立一表置矩心於表顛其矩専視曲轉兩際以稍昻一際直射所望之逺處須自矩角對矩昻際及逺處如直弦然次乃回望稍低一際視其射於何處亦自矩角對低際及地上如直弦然而畫記之其畫處至表址甚近也乃以矩角至表址數自乘而以表址至畫記之數分之即得所望逺數又法欲知江河之濶若干就水旁立一表加一短尺或竹木之枝但以一物為標斜射彼岸水際望定表端所射即將其表旋向平地視其所射之際量之即得河水濶數如不用表則以身代之及取一器映目為率回身取數更便渾蓋通憲圗說卷下
