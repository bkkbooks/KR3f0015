body:
  text: 渾蓋通憲圖說卷下明李之藻撰經星位置圖說第十三太陽當空列曜俱熄至夜而星可測也星莫燦於五緯然各有遲留伏匿不易取齊又金水去地最近猶太陰然不可以地面為較是故棄緯求經地周九萬里半徑一萬四千三百一十八里九分里之二為地面人所測處月離地中心四十八萬二千五百二十二里有餘辰星離地中九十一萬八千七百五十里餘太白離地中二百四十萬六百八十一里餘日離地中一千六百五萬五千六百九十里餘熒惑離二千七百四十一萬二千一百里餘歲星離一萬二千六百七十六萬九千五百八十四里餘填星離二萬五百七十七萬五百六十四里餘經星離三萬二千二百七十六萬九千八百四十五里餘此外即係一日一周之天包絡轉運此天離地六萬四千七百三十三萬八千六百九十里有餘自太陽以上諸星離地絶逺且其體極巨以之較地為甚微則地面地心總之不異故可以通憲測之若太隂金水二星去地不甚逺必須就地心測之法宜另算地形半徑凡經星以四萬九千歲一周天是為歲差亦時有移動但其移也密百年之內所差未多故可以定儀取之其細古稱萬有一千五百二十可名者中外星官三百六十未易悉列然品其光耀約有數等凡經星之體分為六等上等全徑大於地全徑一百零六倍乂六分之一次等大於地八十九倍又八分之一其三等大七十一倍又三分之一其四等大五十三倍又十二分之十一五等大三十五倍又八之一六等大一十七倍十之一附載七曜形體填星全徑大於地全徑九十倍又八之一歲星大於地九十四倍半熒惑大半倍日徑大於地一百六十五倍八之三地大於太白三十六倍二十七之一地大於辰星二萬一千九百五十一地大於月三十八倍又三之一然則日大於月六千五百三十八倍又五之一也别有算法人目所睹近者雖小亦大逺者雖大亦小不可以井窺泥之今略舉大者一二以俟宵測其法有依黃道算者有依赤道算者總之先論各星所值宮度次察各星所離黃赤道度分幾何與其在於黃道或赤道之南北以至異體大小之等而各布其所當之位凡依黃道起算者以黃道分南北以黃道之極為樞說見分黃道度依赤道起算者以赤道分南北而以北極為樞具列於後用黃道經度赤道緯度立算黃道過宫離赤道體等一勾陳三星白羊一五度十分北八十五度五十一分三二閣道南二星白羊三度北五十三度四十五分三三天綱星白羊四十一度三分南二十度分二十六三四奎宿大星白羊十十三度四分北三十四度一十三分三五天倉右三星白羊二十三分二分南十二九度三十分三六大陵大星金牛十一度二十分北三十九度三十二分二七天囷東一星金牛十十一度二三分北二八度十分三八天船西三星金牛十四度五分北四十七度四十二分二九昴宿二星金牛北俱五十畢宿大星隂陽三八度十分北十五度分五十五一十一五車右北隂陽十十一度二一分北四十四度五十六分一十二參右足星隂陽十三度分四十八南九四度十分一十三參左肩星隂陽二十二度三十七分北六六度十分一十四天狼星巨蟹五十三度三分南十五度分四十九一十五北河中星巨蟹十四度北三十一度二十八分二十六南河東星巨蟹十六度分四十三北六九度分一十七北河東星巨蟹十十六度四九分北二十八度四十三分二十八星宿大星獅子十三度十四分南四十二度三分二十九軒轅大星獅子二十二度十一分北十四度十九分一二十軒轅南三星獅子二十四度四十九分北二十二度一十九分二二十一北斗天樞雙女五九度十分北六十二度三十六分二二十二太微西垣上相雙女九十度三分北二十二度五十一分二二十三太微帝座雙女十九度十六分北十七度九分一二十四北斗玊衡天稱七七度十分北五十八度七分二二十五角宿南星天稱十五度十三分南八六度十分一二十六北斗開陽天稱十五度三十分北五十七度二十四分二二十七北斗搖光天稱二十二度五十七分北五十一度四十二分二二十八大角天稱二十九度二十一分北二十一度四十五分一二十九招搖天蝎四度北四十二度三十分三三十氐右南星天蝎七十一度五分南十三度分二十九二三十一氐右北星天蝎十十四度二八分南七八度十分二三十二貫索大星天蝎二十度十一分北二十八度五十一分二三十三市垣梁天蝎二十九度南一十八度五分三三十四心宿中星人馬一十七度二分南二十四度三十六分二三十五市垣帝座人馬十一度分四十六北十十五度二七分三三十六天棓大星人馬十六度一分北五十二度一十一分三三十七市垣候星人馬十八度十分北十三度十一分二三十八織女大星磨羯三十一度五分北三十八度三十六分一三十九河鼓中星磨羯十八度分五十二北七九度十分二四十天津右北三寶瓶三十五度五分北四十三度四十三分二四十一天鈎大星寶瓶十四度十分北六十度四十分三四十二壘壁西星寶瓶十五度八分南十八度分四十六三四十三危宿北星寶瓶十七度分四十一北七五度分三四十四羽林軍大星雙魚四五度十分南十八度三四十五室宿北星雙魚七十七度四分北二十五度三分二四十六室宿南星雙魚八度北十二度分四十一二右法用黃道經度先稽此星在何宮何度於黃規所當之度為齘對盤心作一虛弦為經度線已知此星只在此線之上矣次論星位在南在北在赤道內為北外為南凡星在北方者去極為近法自赤道午中順天左旋數至本星所離赤道之數為齘望黃赤相交酉中作一虛弦名緯度線而専取其與子午線交處為凖自此回量取其至於盤心長短幾何以此轉置黃道經線用規自盤心起視其所當何地即是安星正位若星在南方者去極為逺則於午中逆天右轉數起至其離赤道度亦對酉中作弦取其子午交處量至盤心移歸經線此法經線則一而緯線有左右之殊逺者取度於右遇子午於赤道外近者取度於左遇子午於赤道內此圖以角宿南星為例後圖同用赤道經度北極緯度立算依臺本宿度以二百六十度折算赤道入宿離北極體等一勾陳三星壁一十九度五分三度三二閣道南二星壁六三度十分三十六度三十分三三天綱星壁七十六度四分一百一度五十八分三四奎左北五星奎三十六度五分六十三度分三五天倉右三星奎七十六度四分一百一度五十八分三六天船西三星胃五十二度四分四十一度五十二分二七大陵大星胃三十五度四分五十三度四十六分二八昴宿二星胃十五度十分昴一度五分俱五九天囷東大星胃八七度分八十五度四十二分三十畢左大星畢一十八度五分七十五度二十一分一十一五車右北畢八十三度五分四十五度四十八分一十二參右足星畢十十二度四八分九十八度三十分一十三參左肩星參五十度二分八十二度四十四分一十四天狼星井八十二度二分一百六度二十二分一十五北河中星井十六度分三十三五十八度六分二十六北河東星井二十度十八分六十度五分二十七南河東星井二十度十八分八十四度十三分一十八星宿大星星初十八度二分九十七度四十三分二十九軒轅大星張三八度分七十五度四十五分一二十軒轅南三星張三十七度二分六十八度二十八分二二十一北斗天璇張十五度八分三十一度十分二二十二北斗天樞張十五八度二十分二十五度三十六分二二十三北斗天璣翼十三度三十三度十分二二十四北斗天權翼十三度二十分二十九度四十分三二十五太微帝座翼十三度分七十一度分三十六五十四一二十六微西垣上相翼二十七度五分六十六度三十分二二十七北斗玉衡軫十十一度二分三十一度一分二二十八角宿南星角初度九十八度三十分一二十九北斗開陽角一一度十分三十二度一分一三十北斗搖光角七十二度五分三十七度二十六分二三十一大角亢一十六度四分六十七度五十八分一三十二招搖亢六十六度三分四十九度十五分三三十二氐宿右北氐初度一百三度五十五分二三十四氐宿右南氐四十六度五分九十八度五十分二三十五貫索大星氐四十六度四分五十六度九分二三十六天市垣梁房四十六度五分九十一度三十六分三三十七心宿中星心一十八度五分一百十五度一十五分二三十八天市垣候星尾二十九度四分七十六度二十一分一三十九天市垣帝座尾七十二度五分七十四度五十一分三四十天棓南二星箕三十六度五分四十度分二十三三四十一河鼓中星斗十八度二十分八十三度四十四分二四十二織女大星斗二十度三十分五十一度四十三分一四十三天津右北三星女二十度分四十七度十七分二四十四天鉤大星虛二十二度二分三十度五十分三四十五壘壁西星虛三五度十分一百九度五十分三四十六危宿北星危初十八度二分八十七度十分三四十七室宿北星室初度六十五度三十分二四十八室宿南星室初度七十八度十九分二四十九羽林大星室九十五度四分一百六度五十二分三右法先定各宿之度以檢各星入宿所在自星度對盤心畫經線其緯度自盤心起算自一度至九十度皆在赤道規內視前法則為倒除其九十一度以外者皆出赤道之南用法同此亦用角宿南星而以宿度代宮度黃道經緯合度立算此黃道樞入磨羯初度離北極草三度半截算以萬厯甲辰夏至為凖過宫離白羊離黃道體等一天鉤大星白羊八八度分北六十九度三二天倉右三星白羊十十六度二八分南二十度三十分三三奎左北五星白羊二十五度十八分北二十五度二十分三四婁宿中星白羊二八八度分北七十度二分三五閣道南二星金牛三十二度十八分北四十六度四十五分三六天囷東大星金牛三八九度分南十一度二十分三七大陵大星金牛五十一度八分北三十三度二八昂宿二星金牛北四度三十分五度俱五九天船西三星金牛五十六度十一分北三十度二十畢宿大星隂陽六十四度八分南五十度分一十一參右足星隂陽七十十度二九分南三十一度三十分一十二參左肩星隂陽八十三度二十八分南十七度一十三句陳三星隂陽八十一度三十八分北六十六度三十四五車西北隂陽七十六度二十八分北二十二度三十分一十五天狼星巨蟹九十九度八分南三十九度十分一十六北河中星巨蟹一百四度二十八分北九十度三分二十七北河東星巨蟹一百七度五十八分北六五度十分二十八南河東星巨蟹一百十度三十八分南十六度十分一十九北斗天樞獅子一百三十二度八分北四十九度二二十星宿大星獅子一百四十一度二十八分南三十度三十分二二十一軒轅南三星獅子一百四十二度三十八分北八十度三分二二十二軒轅大星獅子一百四十三度五十八分北十度分一二十三北斗玉衡雙女一百五十三度三十八分北五十三度三十分二二十四北斗開陽雙女一百五十九度二十八分北五十五度四十分二二十五北斗搖光雙女一百七十一度十八分北五十四度二二十六微西垣上相雙女一百五十五度三十八分北十三度四十分二二十七太微帝座雙女一百六十五度五十八分北十一度五十分一二十八招搖天稱一百九十一度八分北四十九度三二十九角宿南星天稱一百九十八度八分南二度一三十大角天稱一百九十八度二十八分北三十一度三十分一三