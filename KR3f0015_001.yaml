body:
  text: 渾葢通憲圖説卷上明李之藻撰渾象圖説天體渾圜運而不息古今制作渾儀最肖就中割圜截弧即是蓋天茲為徑尺之儀法取平懸不得不割截算之然不能離渾天度法故先論渾天之製設一平環名地平規周刻二十四向承以四柱立於四維下為十字渠以水平之規之子午際稍稍刻入以受子午之規子午規在地平規内徑廣稍殺側立之令半出地平規上半入地平規下分為三百六十度其南北鑽通二竅以受渾天南北極之軸此内又作二圜形徑相等而視子午規又稍殺一為冬夏至規一為春秋分規兩規十字相結於結處施鐡軸是為南北二極可旋轉於子午規之内此二規相合其形正圜又一規則横束於分至二規之半為赤道規去南北極各九十度所謂帶天之紘也俱分三百六十度而自赤道中循冬夏至規南北各二十三度半之齘再設二次圜為日行南陸北陸限又作一大圜徑同赤道為黄道規以斜絡赤道之上南北盡結於小圜之齘此圜勻分二十四氣最南曰冬至為景長候最北曰夏至為景短候東交赤道者為春分西交赤道者為秋分皆晝夜平候若勻分三百六十五度有奇則可細列宿度今且作三百六十鍥之其南北極離二十三度半處又各作一小圜而於圜齘當冬夏至規處對貫一軸為黄道軸最中作小圜為地形外加一圜貫軸旋轉為月輪規上施月㳺輪徑十二度輪心正綰規上亦可旋轉以系太隂轉之則為九道此外一圜稍大亦貫軸内為日輪規以系太陽形用此二圜可辯日月交食之理此皆渾天象也古四游六合諸儀大率類此而法有詳略今臺儀仍襲舊制有横簫瞡測而無日月地三形又北極出地鑄為定度而無子午提規以隨地度髙下元史所載西域諸儀亦有綴銅釘通方竅以代横簫或畫圜形周度而不具星宿者隨時消息皆可施用至論天體此為簡明故首著之此渾儀如塑像而通憲平儀則如繪像兼頫卬轉側而肖之者也塑則渾圜繪則平圜全圜則渾天割圜則蓋天夫渾天不可圖也今强圖之以識梗槩地居天中乃設平規於象外者以分地上地下界也側立者乃子午規北極之出地南極之入地各隨所在測定渾象納此規中以二極為圓樞一日一周渾天極圜今割去黄道短規以南一小􅋃為平儀所不用者此内大􅋃自午中冬至度逾北極際迄夜半冬至度共徑二百二十七度平儀截用為蓋天形而置北極於中央云赤道規界說天體無涯難以器測强從南北二極之中界判一線細道名曰赤道因設此規亦曰晝夜平規在天則太陽躔度際此天下晝夜均平在地則國當赤道之下者通年晝夜皆平也此規之設用以度天行一日一周之運用以定晝夜刻分之永短刻分長短雖據黄道實以赤道為宗用以齊黄道出入不齊之度用以限春秋分之晷景而又由此判天道之南北以起南北之緯算以紀天下之地員用之大者凡七黄道規界說七政所經行者命曰光道亦曰黄道黄道與赤道如兩環相疊然半出赤道北半出赤道南以三百六十度計之則南北所出經度各一百八十度而緯度之最逺者大約二十三度有半其經度每三十度為一宫十五度交一氣正北為天正冬至之始月建在子半其宫磨羯之初次稍東為小寒月建丑初大寒丑中其宫寳瓶立春月建寅初雨水寅中其宫雙魚驚蟄月建夘初而交於赤道為春分夘中其宫白羊稍轉而南為清明建辰穀雨辰中其宫金牛立夏建巳小滿巳中宫入隂陽芒種建午盡於夏至月建午中宫入巨蟹稍西為小暑建未大暑未中宫入獅子立秋建申處暑申中宫入雙女白露建酉又交赤道為秋分月建酉中宫入天秤次為寒露建戌霜降戌中宫入天蝎立冬建亥小雪亥中宫入人馬大雪建子而又值天正冬至更細鍥為三百六十五度四之一則二十八宿列焉凡月建與宮界常差十五度而中厯太陽所躔星紀等次又與西厯白羊等名常差數日西厯所謂動的月不動的月天有九重則黄道亦有九重推法甚活今只據西厯取其便於鍥度則以白羊戌宫為始所謂步戌成歳者也所以分黄道為十二宫者日月相逐㑹於黄道者歳十二次而一歳四時有十二變取數於十二其義最精半之則為六三之則為四四之則為三凡諸曜之行歳時之變總之不出於此凡天下寒暑榮瘁皆由黄道中國當赤道之北故太陽之行黄道也北陸而暖而萬物生南陸而寒而萬物死也而黄道一規有四用一以節七曜列宿逆天右轉之度黄道内惟日行道中一線餘各别有一小輪因有疾遲退伏離地愈逺則其規愈覺小也一以審日月交食大抵近黄道則食一以其出地多寡定天下晝夜長短一以分星宿之南北及紀其緯度凡論黄道宮分者固不止規上一線凡二極之内周天星宿皆以十二判之但在本宮界内皆以本宮立算義同剖􅏨中厯從北極剖之紀以二十八宿西厯則以磨羯之初去北極二十三度半處為黄道極而剖分焉晝長晝短南極北極四規說此四規分天下寒暑氣候為五截日景亦五截赤道之下其地四時皆燠而春秋分為甚為適當日道之下也冬夏至稍減而其為燠則同為僅去日道二十三度半也其春秋分日中無景過春分則景在南過秋分則景在北長短二規之下其地每歳一極寒一極暑而正相反在長規者夏至暑冬至寒日有東南西三景而南景為常在短規者反是日有東北西三面景而北景為常過此二規則日不經天頂過矣惟赤道與長短二規相離適中之地冲和之氣鍾焉中國去赤道十九度至四十二度凡此自東徂西一帶正當其界毓靈孕秀遂多聖賢豪傑之儔此外過􅫥過寒皆屬偏氣雖有人類蠢頑不靈漸近南北二極之規黄道之所不至晝夜永短偏勝之極此二規内則天地之氣極寒周圍皆有日景而以半年為晝半年為夜矣子午規說此規靈臺所無今增設於渾象之外而以渾象之極納之令其旋轉太陽從天上經此規為午中地下經此規為子中故名子午規設此規其用有五一以分半晝半夜刻數一以尋列曜極高過頂之度當此之謂中星一以此規計日凡毎日自子半起正當此規之下一檢夜半中星以定太陽正宿一此規分周天度亦可縁太陽以求赤道縁赤道以求北極而萬國全圖所列曲線皆係此規但取中分南北過頂一線為名隨地而異地平規說此規平分渾象之半凡北極日月列星在此上者可見在此下者不可見日在此上為晝在此下為夜而可以定北極赤道離地之度可以定星辰出入之分及何星常見不伏何星常伏不見可以定宿曜同出同入之度及先後出入度可以定太陽各曜所出地離赤道幾何緯度假如夏至日離赤道二十三度半惟赤道之下其出地入地過午皆同若北京在四十度惟午時所離赤道如前至於出地入地却差於緯度也更北則漸差漸多可以辯各曜出入方位可以算各曜漸升之度自一度上至九十度止通憲専重此度此規應設二規一當地中半處一當地面若太陽經星及木火土三星離地絶逺即以地中作平規算法亦無差若算太隂及金水二星離地不甚逺則當就地面起算方得確度耳此運規之器以銅鐡為之圓頂二髀可閤可開一居中一旋轉銳施精鋼離銳少許鑚孔劃綖以便用墨凡為圓必取中規乃為至圓為直必取中繩乃為至直方亷隅角莫不皆然差之毫釐繆以千里凡圓舒線成直中判成隅耦交則方參立則平萬形皆出於圓謂圓出於方者非也渾蓋舊論紛紜推步匪異爰有通憲範銅為質平測渾天截出下規遥逺之星所用固僅倚盖是為渾度蓋模通而為一面為俯視圓象背則璿璣玉衡中樞兼有南北二極系以瞡筩及定時衡尺其上弁以提紐用則懸之儀之陽有數層上為天盤其下皆為地盤各具三規中規為赤道今名晝夜平規内外二規為南至北至之限内規為日行最北之道今名晝長規外規為日行南至之道今名晝短規詳具於後而黄道絡於内外二規之間天盤渾是天體用黄道以紀太陽周天之度度分三百六十剖為十二宫二十四氣其度斜刻𦂳切地盤以便觀覽錯以經星星不具載載其最明鉅者各以鍼芒所指為凖地盤隨地更換各視所用地方北極出地之度為率其盤分地上地下二限最下一曲線為晨昏界今名朦影規稍升一曲線為出地入地之界今名地平規自此以上度數以漸平升直至天頂勻為九十度以觀太陽列宿漸升漸降所到其中央一直線則當子午之中其過頂一曲線結於赤道夘酉之交者則為正東西界南午北子東夘西酉其餘方向皆有曲線定之近北窄而近南寛蓋若置身天外斜望者然其晨昏界下諸曲分為五停又為夜漏之節云儀之隂中分十字界其衡界以分入地出地之限其最上近紐處為天中外規周分三百六十度自地上至天頂左右俱鐫九十度中央運以瞡筩筩立兩表各有大小二竅以受大陽列宿之影以觀其影離地而上得幾何度其三百六十度每三十度作一宫内次層則分三百六十五度四分度之一以具歳周全數備刻節氣列宿以與外盤相凖為用皆以瞡筩審定此為太陽行天實度也中央上截另為分時小軌下截方儀以勾股測逺近高深各有詳其圖說天體混淪不立度數則窺望曷據通憲之度全用渾儀而有地盤以平布於下分方隅第升度有天盤以平覆於上列黄道羅星宿而外盤則剗周天之度測三光之景總挈而左右瞡焉周天之象為度三百有六十凡以日揣天者度法三百六十而餘五度四分度之一今但用三百六十舉捷數也法於儀之中作一句線為夘酉線一股線為子午線外周規分為四停毎停九十度共三百六十度刻之外盤之隂而瞡筩則綰之樞中中分一線左右各殺其半兩端對立二表表有孔大小各二以望太陽列宿之度樞則旋轉盤上提衡定之如懸正儀儀外盤之陽亦分三百六十度毎度為六十分外一層而以三十度為一時中股線最上為午中最下為子中句線左為夘中右為酉中凡子午夘酉中之左右界各盡十五度共三十度為一時餘時以次序列中一層毎時分八刻共九十六刻内一層凡日法百刻刻法六十分凡毎時八刻零二十分初初刻一十分初一刻初二刻初三刻初四刻各六十分正初刻一十分正一刻正二刻正三刻正四刻俱六十分也今減去餘分但作八刻以便起算昔梁天監中作厯亦曾用此天體一而已人居地上東西異而日月星升沈之候異焉然寒暑發斂同其𤣥象未有移也南北異則晝夜長短刻分俱異矣北極赤道之高卑亦異矣故有晝短規有晝夜平規有晝長規而短規最大平規次之長規最小蓋平儀系極中央中央之極實該南北二極試設八尺渾儀於此人自南極之外以望北極晝短之規最近定覺最大晝夜平規次近則覺次大晝長之規最逺則亦覺其最小平儀立法取此而中國在赤道以北故置晝長規於赤道内晝短規於赤道外凡晝短規以内其星稠而在望近短規以外其星有不可望者矣夫是以畧也說詳後篇分規之法先以晝短規分周天度就子午線之中右行尋廿三度半為齘從此斜畫一線貫子午而右到酉中而止取其與午線遇處從樞心旋一圜是為晝夜平規即赤道規又於赤道規分周天度從午中右行數廿三度半斜畫一線到酉中取其遇午線之處為界從心畫一圜是為晝長規而三規具焉赤道當天地之中置晝長規於赤道内則凡赤道之内通謂之北而中樞則專為北極其外則通謂南方圖天文者中北極而以内外天官四布於外内北而外南平儀正同此理惟是配以地盤别以地度則其創耳凡太陽行赤道之内近北極則晝長行赤道之外逺北極則晝短總之以廿三度半為南北至亦有變遷今不具悉故平儀以廿三度半為長短規線之限自赤道至北極九十度北極居中不動地與極漸逺則斜倚而移故變地度以就極樞而平長短三規不易焉測晷之法先定天頂舊名嵩高自天頂周垂而下至於地平犂為九十度即列為二十四向無不為九十度也者以辯太陽諸星出地之度而筩以瞡之自地心平規為始累而上之毎一規為一度至天頂而九十度終焉天頂者二十四向之㑹至中極正其際不可以鍼芒爽總之不出子午一線然而隨人身所立以為移易其為術也屢遷所居之地若離亦道一度則天頂亦離赤道一度第赤道在天無形故但以北極出地定之凡北極移一度則天頂亦移一度人居赤道下以赤道為天頂人居北極下以北極為天頂居晝長晝短規之下亦各以其長短規線為天頂其餘地度各有推定之法總與地平之法相因先将赤道規分周天度以後凡赤道規皆分周天度乃於夘線北行起算依地方北極出高幾度幾分立齘於赤道之規而畫弦以貫盤心北左齘為北極南右齘為南極此名南北極軸又於午線之東亦尋北極度分為齘此齘正當二極之中赤道之位亦貫盤心畫弦謂之赤道軸自此赤道南軸斜望酉中經過午線再畫一弦取其交午線處即為所求天頂若自北極齘畫弦過酉中則交午者即地平際也原所以取赤道夘酉中為凖者蓋赤道紘天地之中夘酉又分赤道之中借夘酉以為地心因望地心以求天頂儀體雖平其用則圜而其經緯從衡之妙全在赤道一規平視之而分子午夘酉側視之而寄南北二極二極結子午之正寄二極於赤道者借赤道之規為子午規者也後凡地盤度皆自赤道為凖既得天頂則自天頂以對地心有一規總謂天頂規此規上下過天地之中東西交赤道夘酉之中辯方正位於是乎取其法自赤道規酉中起數地方赤道出地之度或自子中起數北極出地之度其法皆同但數一處刻齘自酉中按齘作弦長出求其交子中線處即是地下對頂中際從此上望天頂折半求中以是為樞旋而規之即成天頂之規此規既立地面以上方隅俱可按法而得又法自赤道酉中為樞作大半規以包晝短規於内而循樞畫一直線與子午並垂以為半規之限將半規分周天全度從夘酉横線中分為二停又中分為四停每停刻九十度而即借南北二停中之弦線為子午線以近横線中之百八十度為周天東半之度以最南北之百八十度為周天西半之度因借赤道酉正之樞以為南極而設直線以便分度縁赤道分度界線衡易從難故變通其法以求確當理則一也法自半規之中夘酉横線而上尋赤道出地之度望酉中虚畫一弦取其過午線處為天頂齘又自半規之下循直線左行亦數赤道出地之度望酉中虚畫一弦取其過子線處以為地下對頂之齘兩齘折中為樞旋規即得天頂不異前法但地心際其界甚逺恐盤小則不易及另有不必地際徑取中樞之法其法有二一法自赤道規酉線起左行尋赤道之數數外又加一倍刻之為界自酉線按此畫弦斜射子午其子線所得之齘即是頂規之樞一法即從半規求之即得半規上赤道出地之數乃於數上再加一倍上望酉中作弦其與子午交處亦得頂規之樞二法合而試之乃可無差凡日月星辰之可見者見其出地者也地平規以下無所庸測已地而上出濁入濁雖微有所蔽可度而按也人居赤道之下平望南北極以夘酉直線為地平居此極之下以赤道規為地平其餘各有求測之法自北極出地一度至八十九度餘各有定則北極出地淺則規最大漸出漸高則其規漸小至於北極為天頂赤道為地平則其規最小矣赤道而南反此互用凡求地平之法先自赤道規夘中起量北極出地幾度幾分至其度分齘之從所齘過子線對酉中作弦取其遇子線處以為最北地平之界此界之上為地上此界之下為地下凡剗度而望日星之晷望其在地平以上者也又將此北極之齘貫心作軸而自酉中望南極之齘斜弦以達午線取午線所交之齘為最南地平之界此界直出盤外大抵以北極出地之高下為逺近其南北兩界之半定為中樞旋器成規是為地平規凡地平規東西必與夘酉之之中相交此規可以分出地入地之度可以起地上平升之度可以求地下之朦影可以分地上為六分地下為六分詳具於後又法亦自酉中作樞旋大半規與子午線並行作直線以為規限将半規分周天全度又從横線中分為二又分為四如求天頂之法而以北極之度為據假如北極出地四十度即自直線之上右行尋四十度之際望酉中作一弦以過午線處為南方地平之際又自夘線以下右行尋四十度之際亦望酉中作一弦以過子線處為北方地平之際兩際折中旋規之即得地平曲線此南北弦際在赤道者與前從赤道數度飛線之法相同而更為凖確又有不必折半即得中心二法其一即以赤道所得之度再加一倍如出地四十度即尋八十度之類得此加倍之齘因自酉中透弦取其午線所當即為中心其一即於半規之上再加一倍尋其所到度數亦望酉中畫弦取其午線所當亦是中心二法合而試之即無差失其餘漸升度數亦可依此而求既有地平之規即攷漸升之度自地平上升躋於天頂九十度毎度一規或三度五度一規視器之大小為之凡求漸升度以前圖南北極軸線為齘去齘北不用自齘而南以半規勻分百八十度或兼二度則分作九十兼五度則分作三十六中定赤道軸線以求天頂次自北極左行第一度望酉中畫一弦又自南極右行第一度望酉中畫一弦二弦皆過盤中子午線而取子午線上所得之齘上下折半為樞旋規是為漸升第一規當出地之第一度餘自二度至九十度亦如之南疎北密以為常凡地上升一度則南北極外各漸進一度至天頂止又法即用前大半規假如北極出地四十度則就夘酉横線起右行尋四十度處為北極又自直線上際右行尋四十度處為南極南北各對酉中畫弦以取子午之交定地平規如前法而即自南北極度之中各離九十度處仍望酉中作天頂線而以天頂左右至南北極界百八十度為用假如欲尋地平以上第一規則尋南北極以内第一度而各對酉中作一弦以其經過子午線上者為南北之際因而規之如作地平規法是為第一規次自第二規以至八十九規而止莫不皆然凡百八十之度每二度共得一規若盤小欲取二度三度作一規則減度畫線其法仍前既有漸升之度又當知地上四方十二方或二十四向之所在而後星辰所到之位易知也且如子午二向則原有在盤直線可定其理易知欲尋夘酉正中雖有盤中横線但其線正倚北極地度遷移不當夘酉正中之向必當直剖天頂之中以天頂一規東西絡於赤道規夘酉之交方為正向故天頂規亦名夘酉規子午夘酉既明則諸凡方位皆可按規而定俱以天頂大規為主就此規心再横一線與子午線為十字形左右長出此線横截地中即借之為地平線凡分方各規之樞皆不離此次取大規從子午勻分八分或十二分廿四分三十六分各望天頂為樞用尺按其所分之齘畫弦斜出尋其到横線上者㸃記為心然後毎位皆依此心旋而規之毎規俱取過頂即為地上各方定位凡近夘酉者規樞較近惟近於子午者規心較逺云又法以天頂規最上一半分齘求心畫線未確别立簡易半規以當周天全度先從天頂横一線與夘酉横線平行以為半規之限次就天頂為樞望下旋半規如仰月形以半規分八方或十二宫或二十四向或三十六分而以尺按齘自頂畫弦仍以夘酉大規横線為際一一記其交處為樞而各望頂中旋規則亦與前法相同右以横線立樞旋規雖各規大小不同但上過天中則其下亦過地中若自地中為樞向上畫成半規如偃月形照前分其度位按齘畫弦記於大規横線法亦不異此見規法之妙晝夜之分地平規判矣若乃晝有朝有禺有中有晡有夕夜有甲乙丙丁戊古人以分刻制漏踐更作役用亦不細此以毎畫為五分毎夜為五分而節氣晝夜長短弗論焉刻之地盤與十二時之法相參其法不計赤道細度但以平規分晝夜齘限取晝長晝短晝夜平三規於地平界上下各自分為五停先要識三點同圜之法假如立定三㸃須要先知三點之心何在即可以一圜貫之先取甲點與乙點相擬用規各作半圓相切取其圓之兩交處直分一線長出又将乙㸃與丙㸃相擬用規各作半圓相切取其圓之兩交又分一線長出而以兩長出線相交之處為樞旋規則三㸃俱在一規之中凡晝夜五分之法以此為宗假如地平而下晝長規勻作五分晝短規作五分晝夜平規亦作五分欲知日入第一停之齘即尋地平規右下第一停檢之毎停各得三㸃以三㸃依前法求交又依交處求樞成規即三點聨為一線凡四線而五分之限成焉其欲定更點細度者當自晨昏線下扣除初更前二㸃及五更後二㸃勻作二十一點刻之亦照前法但地平以上有漸升方位諸線分度已多不便重複今分地平以下為圖大都可以互見七政列宿皆寄黄道黄道十二宫之旋轉於天也不論赤道逺近北極高低大抵出地六宮入地六宮蓋赤道出入於地其度分隨時互有多寡若黄道則斜絡赤道隨處皆上下相半故二十八宿常有十四宿在天可見其法既有赤道規又知地平曲線乃以赤道規勻分十二齘兩兩過心相對加以地平曲線之遇子午線處為一點成三點照前三點合圜之法畫成十二宮蓋毎宮皆以地平子午之交為心而以赤道上相對二點定之太陽出沒是分晝夜其輪之大於地也凡百餘倍光照極逺故将出之先既沒之後俱有朦朧之影焉在朝為晨在夜為昏古法定以二刻半為率不知朦影多寡固以候異亦以地異總之北極高下不同黄道輪旋日之入地又有斜直故朦影亦有長短凡朦影皆在出地前入地後十八度内今以平儀之度畫線界之居可知己其法自赤道夘中右行數本地北極出地之數又外加十八度為齘次於午中左行取本地赤道出地之數亦外加十八度為齘兩齘相望而自酉中望北齘畫弦取其與子線遇處以為朦景之北盡界自酉中望南齘亦畫一弦貫午中長出齘外如求地平南界之法取其交午線處以為盤外朦景之南盡界南北兩界折中為樞作規即得盤内朦景曲線右法邉際大逺又法就前北極出地之數望南極聨弦為軸又就前兩十八度加出之齘亦聨一弦為朦影軸而設赤道軸線即南北極九十度之中令之長出直與朦影軸線相遇作直角形乃取直角之中為用望酉中畫一長弦北過子線抵赤道規視其所指規齘從此用規左旋量至前赤道軸齘為率又自軸齘左旋再加一倍量至盡處鍥之按此復自酉中用尺畫弦斜出得其交於午線者便為朦景曲線之樞比前法近一半云又法即以地平曲線完成一規規心横一線作十字形規上分周天度乃從地平北際子中右旋取十八度為齘又於南際午中左旋取十八度為齘而上下相對虚一線以虚線與横線交處為凖而自酉中望此畫弦斜上得其交於午處即是朦朧曲線中心天盤黄道圖說第十二日月星行度皆順黄道右旋黄道斜交赤道南北出入其最逺者各廿三度三十分厯取二十四度冇奇今節去五度四分度之一故只用二十三度半為南北至故晝長晝短之規皆以為率此地盤法也天盤黄道即以地盤長短規為凖從晝短規之南到晝長規之北為二際折中為樞旋規此規必與赤道規及夘酉平線三合方凖是為黄道規其樞當就赤道數夘中以上四十七度望對靣酉中畫弦而取其過午線者以為規樞凡太陽行黄道歳與太隂十二㑹因分之為十二宮厯法𤣥枵星紀等宫尚過節氣數日今即以節氣為交宫之限而仍以西法白羊諸像紀名非立異同蓋便界畫所謂不動的月也每宮三十度毎十五度交一氣且以地盤十字線為限言之自平線以下夘中起初入白羊宮交春分又十五度交清明右行凡三十度而盡入金牛為穀雨立夏又三十度入隂陽宮則小滿芒種也又三十度而際子中入於巨蟹夏至以之其繼為小暑次乃入獅子為大暑至於立秋又次入雙女其躔處暑白露終三十度而又得平線以上則酉中天秤也秋分主之繼乃為寒露次乃天蝎霜降立冬其候也又次人馬是為小雪大雪而交於午中磨羯之初天正之冬至若小寒則實司之次入寶缾為大寒十五度而一歳終焉又閱十五度當立春正月之節故寳缾之半新舊之交也次則入雙魚兩水驚蟄而盡復抵於夘中白羊凡此十二宮者以地盤對之則巨蟹如子磨羯加午白羊乘東天秤衡西彼此換宫遥對蓋地上之子午夘酉静而有定天行之子午夘酉動而不居平儀之制理取倒影故以遥射立法至於春分之晨秋分之昏則午南子北夘東酉西各宫自歸其位此則於用法見之固與分宮之法異耳今厯家約分四大限定為常氣則二至雖同而春分在日行赤道後三日秋分在日行赤道前三日其餘各差一二度另有外盤歳周之法詳檢之云細分二十八宿則當刻於歳周規三百六十五度四分度之一之上然此處亦可畧見大畧白羊初度交壁初其九度交奎廿六度交婁金牛初度交婁五其七交胃廿三交昴隂陽初度交昴七其四交畢廿一交觜交參巨蟹初際參井獅子初交井三十其一交鬼三交栁十六交星廿三交張雙女初度交張七其十一度交翼天秤初度交軫初其十七交角天蝎初度交亢初其十度交氐廿七度交房人馬初度交房三其三度交心九交尾廿七交箕磨羯初度交箕三其六交斗寳瓶初度交牛初其七交女十八交虚廿七交危雙魚初度交危三其十三交室也經星亦是逆天古轉西法以為六十六年行一度顧遲疾亦有不同此即歳差之論今所較姑以萬厯甲辰為率凡黄道細分之度其疎密與赤道迥異赤道以盤心北極為心黄道則别有旋規之樞又有斜望之樞赤道度分勻排黄道則南北疎密有異且如只以赤道推求則當先論赤道一度與黄道所差幾何然後可以布列剗度另有算定成法具圖於後圖不細載第攷五度差率其餘可推依此算定分界貫盤心畫其宫度黄赤二道差率畧三百六十度立算又法不必對檢赤道但尋黄道斜轉之極在天黄道極原去北極廿三度半入磨羯初分其錯行赤道内外亦只去廿三度半故其法先從赤道一規酉中右上數至廿三度半為齘望對宮夘中黄赤之交過午作弦取其交午為用以為黄道之極如再増廿三度半即是前圖黄道規樞規中與極中只差廿三度半也既得此極因將赤道規勻分十二宫以分處一一貫於極心按尺斜出點記黄道規上於是乃以盤心為心望黄道所點記者而畫界焉或分十二宫或每宫分三十分皆照此法比前算不殊而術更簡又法亦尋黄道之極如前法次求黄道南極旋成大規法於天秤角即黄赤相交右角左行尋日離赤道盡處亦二十三度半為齘而用尺自交對齘望下斜畫長弦至與子線相交而止此為黄道南極在於盤外者自此望上盤内黄道北極折半為心儘兩極之界旋為大規此為黄道全體之規規中再横一線即地心線直長貫出規外次以此規分為十二宫齘仍自黄道北極為樞逐一對齘畫線旁引直貫刻記地心横線因以所刻為心旋規以分黄道諸宫假如欲求獅子宫界則於全規之下右行尋第一齘以尺按此上儘黄道之極旋成一規記於黄道之規此規南上一段即得獅子此下一段亦得寳缾餘法皆同欲分每宮三十度亦照此法若恐黄道全規近上一半齘線不易確凖則自黄道之北極旋半規作仰月形如前分位之法亦可已上三術各有所用第一術不必尋黄道之極但就赤道分度加算其法頗簡而算法不易第二術但以廿三度半求黄道斜望之極不必起赤道算然以直線分黄道止得適當黄道一線之度其出入南北圓體尚須别求第三術亦不起算第求黄道之北極又求其相對之南極而渾天圓體與黄赤二道之宫數在目中但以規大為難然欲求安星正位於用最切又法分黄道度者但勻分赤道作三百六十度以所分之度逐一南北相對作虚直線以識於夘酉横線之上而依前法以求黄道之極併其南極因取其大規之樞心以為用自此處上望横線所識齘用尺逐一作弦透畫於黄道之規凡一弦即可分上下二度在横線以上之百八十度則寬在横線以下之百八十度則窄合之共三百六十度得黄道度其赤道虚度不用又法且将黄道虚分三百六十勻度而借虚度以取實度上下相對貫黄道之極以取之欲分在南之百八十度則用在北虚分之度欲分在北之百八十度則用在南虚分之度皆以黄道極為總轄而一一過之視直線之所擬而為之齘以成南稀北宻之度假如欲分磨羯之第一度則将子線北右虚分之第一度望上用尺過黄極視其午線以西所得之度在於何處刻之欲尋巨蟹第一度則又将午線南右虚分之第一度貫黄極視子線以東所得之度刻之其餘倣此又法亦以三百六十勻分黄道且將黄道極畫一横線次於赤道尋廿三度半為齘畫長弦求黄道之南極如前法乃自南極為樞用尺一一擬上虚度作弦而以極上横線界之上下互取借虚度以刻實度如刻極横線以上百八十度則用線下所勻分者為用尺之界以成天秤至雙魚之度如刻極横線以下百八十度則用線上所勻分者為用尺之界以成白羊至雙女之度此自黄道南極以望其北極因而斜倚分之以見縱横曲折無不中度之妙以上三法俱只論適當黄道一線之度若稍南稍北另有地心横線旋規之法渾蓋通憲圖説卷上
